<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lector EPUB - Leyendo</title>
  <link rel="stylesheet" type="text/css" href="/styles.css">
  <link rel="icon" href="/books.png" type="image/x-icon">
  <style>
    .reader-layout {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      align-items: flex-start;
    }
    #toc-sidebar {
      width: 280px;
      max-height: 70vh;
      overflow-y: auto;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 15px;
      background: #f9f9f9;
    }
    #toc-sidebar ul { list-style: none; padding-left: 15px; }
    #toc-sidebar li { margin-bottom: 8px; }
    #toc-sidebar a { text-decoration: none; color: #3498db; font-size: 0.9rem; transition: color 0.2s; }
    #toc-sidebar a:hover { color: #2c3e50; text-decoration: underline; }
    #book-viewer { flex: 1; }
    .toc-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
    #book-cover-nav { width: 100%; border-radius: 4px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: block; }
    .reader-controls {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }
    .nav-button {
      padding: 10px 20px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
      font-weight: bold;
    }
    .nav-button:hover { background-color: #2980b9; }
    .nav-button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
    .font-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: white;
      padding: 5px 10px;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .font-control select {
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 500;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jszip/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <h1>📚 Lector EPUB</h1>
      </div>
      <div class="navbar-links">
        <a href="index.html">Inicio</a>
        <a href="books.html" class="active">Biblioteca</a>
      </div>
    </div>
  </nav>
  <main class="main-content container">
    <h2 id="book-title-display">Cargando Libro...</h2>
    <div class="reader-layout">
      <div id="toc-sidebar">
        <div class="toc-title">Contenido</div>
        <div id="toc-list">Cargando capítulos...</div>
      </div>
      <div id="book-viewer">
        <div id="book-content" style="height: 70vh; border: 1px solid #dee2e6; border-radius: 8px; background: white; overflow: hidden; box-shadow: var(--shadow);"></div>
        <div class="reader-controls">
          <button id="prev-chapter" class="nav-button" disabled>« Anterior</button>
          <div class="font-control">
            <label for="font-family-select">Tipografía:</label>
            <select id="font-family-select">
              <option value="Default">Original</option>
              <option value="'Helvetica', sans-serif">Helvetica</option>
              <option value="'Georgia', serif">Georgia</option>
              <option value="'Times New Roman', serif">Times New Roman</option>
              <option value="'Verdana', sans-serif">Verdana</option>
              <option value="'Courier New', monospace">Courier New</option>
            </select>
          </div>
          <div class="font-control">
            <label for="font-size-select">Tamaño:</label>
            <select id="font-size-select">
              <option value="100%">Normal</option>
              <option value="80%">Pequeño</option>
              <option value="120%">Grande</option>
              <option value="150%">Extra</option>
              <option value="200%">Gigante</option>
            </select>
          </div>
          <button id="next-chapter" class="nav-button">Siguiente »</button>
        </div>
      </div>
    </div>
  </main>
  <script src="/reader.js"></script>
</body>
</html>
